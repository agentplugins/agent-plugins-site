name: Add Plugin CI

on:
  push:
    paths:
      - ".github/workflows/add-plugin-ci.yml"
      - "packages/add-plugin/**"
  pull_request:
    paths:
      - ".github/workflows/add-plugin-ci.yml"
      - "packages/add-plugin/**"

jobs:
  add-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/add-plugin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
